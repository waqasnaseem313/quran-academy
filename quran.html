<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quran Reader — Quran Academy</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    body { overflow: hidden; }
    .qa-quran-shell {
      display: grid;
      grid-template-columns: 300px 1fr;
      height: 100vh;
      position: relative;
      z-index: 1;
    }
    /* Surah sidebar */
    .qa-surah-sidebar {
      background: var(--teal-900);
      border-right: 1px solid rgba(201,168,76,0.12);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .qa-surah-sidebar__header {
      padding: 20px 18px 14px;
      border-bottom: 1px solid rgba(201,168,76,0.1);
    }
    .qa-surah-sidebar__logo {
      font-family: var(--font-arabic); font-size: 1.4rem;
      color: var(--gold-400); text-align: center;
      margin-bottom: 14px;
    }
    .qa-surah-search {
      display: flex; align-items: center; gap: 8px;
      background: rgba(10,22,40,0.6);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: var(--radius-md);
      padding: 8px 12px;
    }
    .qa-surah-search input {
      flex: 1; background: none; border: none; outline: none;
      color: var(--cream); font-family: var(--font-body); font-size: 0.85rem;
    }
    .qa-surah-search input::placeholder { color: rgba(245,240,232,0.3); }
    .qa-surah-list {
      flex: 1; overflow-y: auto; padding: 8px 0;
    }
    .qa-surah-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 18px;
      cursor: pointer;
      transition: background var(--transition);
      border-left: 3px solid transparent;
    }
    .qa-surah-item:hover { background: rgba(201,168,76,0.05); }
    .qa-surah-item.active {
      background: rgba(201,168,76,0.08);
      border-left-color: var(--gold-500);
    }
    .qa-surah-item__num {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: rgba(13,76,76,0.6);
      border: 1px solid rgba(201,168,76,0.15);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-size: 0.65rem;
      color: var(--gold-300); flex-shrink: 0;
    }
    .qa-surah-item.active .qa-surah-item__num {
      background: var(--gold-500); color: var(--dark);
    }
    .qa-surah-item__ar { font-family: var(--font-arabic); font-size: 0.95rem; color: var(--cream); }
    .qa-surah-item__en { font-size: 0.68rem; color: var(--teal-200); font-family: var(--font-ui); }
    .qa-surah-item__meta { font-size: 0.62rem; color: var(--teal-300); font-family: var(--font-ui); }
    /* Reading area */
    .qa-reading-area {
      display: flex; flex-direction: column; overflow: hidden;
    }
    .qa-reading-topbar {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 28px;
      background: rgba(10,22,40,0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(201,168,76,0.1);
      flex-wrap: wrap;
      gap: 10px;
    }
    .qa-reading-topbar__title {
      font-family: var(--font-display); font-size: 1rem;
      color: var(--gold-300); flex: 1;
    }
    .qa-ayah-container {
      flex: 1; overflow-y: auto;
      padding: 0 40px 40px;
    }
    .qa-bismillah-header {
      text-align: center;
      padding: 32px 20px 20px;
    }
    .qa-bismillah-header .arabic-bismillah {
      font-family: var(--font-arabic);
      font-size: 2.4rem; color: var(--gold-300);
      line-height: 1.4;
    }
    .qa-bismillah-header .surah-name-en {
      font-family: var(--font-display); font-size: 1.2rem;
      color: var(--cream); margin-top: 10px; letter-spacing: 0.08em;
    }
    .qa-bismillah-header .surah-name-ar {
      font-family: var(--font-arabic); font-size: 1.6rem; color: var(--teal-200);
    }
    .qa-bismillah-header .surah-meta {
      font-family: var(--font-ui); font-size: 0.78rem; color: var(--teal-300); margin-top: 6px;
    }
    .qa-ayah-block {
      padding: 20px 0;
      border-bottom: 1px solid rgba(201,168,76,0.06);
    }
    .qa-ayah-block:last-child { border-bottom: none; }
    .qa-ayah-arabic-text {
      font-family: var(--font-arabic);
      font-size: 1.8rem; line-height: 2.2;
      color: var(--cream);
      direction: rtl; text-align: right;
      margin-bottom: 10px;
    }
    .qa-ayah-number-inline {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--teal-600); border: 1px solid var(--gold-500);
      font-family: var(--font-display); font-size: 0.62rem;
      color: var(--gold-300); vertical-align: middle;
      margin: 0 4px;
    }
    .qa-ayah-translation {
      font-family: var(--font-body); font-size: 0.88rem;
      color: var(--teal-100); line-height: 1.7;
      padding: 10px 14px;
      background: rgba(13,76,76,0.15);
      border-radius: var(--radius-md);
      border-left: 2px solid rgba(201,168,76,0.2);
    }
    .qa-font-control {
      display: flex; gap: 6px; align-items: center;
    }
    .qa-font-btn {
      background: rgba(13,76,76,0.4); border: 1px solid rgba(201,168,76,0.2);
      border-radius: var(--radius-sm); color: var(--cream);
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-family: var(--font-ui); font-size: 0.82rem;
      transition: all var(--transition);
    }
    .qa-font-btn:hover { background: var(--teal-600); color: var(--gold-300); }
    .qa-loading-surah {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 16px;
      color: var(--teal-200); font-family: var(--font-ui);
    }
    @media (max-width: 768px) {
      .qa-quran-shell { grid-template-columns: 1fr; }
      .qa-surah-sidebar {
        position: fixed; left: -300px; top: 0; bottom: 0;
        width: 280px; z-index: 100;
        transition: left 0.3s ease;
      }
      .qa-surah-sidebar.open { left: 0; box-shadow: 4px 0 20px rgba(0,0,0,0.5); }
      .qa-ayah-container { padding: 0 18px 32px; }
    }
  </style>
</head>
<body>
  <div class="qa-bg-pattern"></div>
  <div class="qa-quran-shell">

    <!-- Surah List Sidebar -->
    <div class="qa-surah-sidebar" id="surahSidebar">
      <div class="qa-surah-sidebar__header">
        <div class="qa-surah-sidebar__logo">﷽</div>
        <div class="qa-surah-search">
          <span style="color:var(--teal-300);">🔍</span>
          <input type="text" id="surahSearchInput" placeholder="Search Surah..." oninput="filterSurahs()" />
        </div>
      </div>
      <div class="qa-surah-list" id="surahListEl">
        <div style="text-align:center;padding:40px;color:var(--teal-300);font-family:var(--font-ui);">Loading Surahs...</div>
      </div>
    </div>

    <!-- Reading Area -->
    <div class="qa-reading-area">
      <div class="qa-reading-topbar">
        <button class="qa-hamburger" style="display:none;" id="menuBtn" onclick="document.getElementById('surahSidebar').classList.toggle('open')">☰</button>
        <div class="qa-reading-topbar__title" id="topbarTitle">📖 Select a Surah to begin reading</div>

        <!-- Controls -->
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
          <label style="display:flex;align-items:center;gap:6px;font-family:var(--font-ui);font-size:0.78rem;color:var(--teal-200);cursor:pointer;">
            <input type="checkbox" id="showTranslation" checked style="accent-color:var(--gold-500);" onchange="toggleTranslation()" />
            Translation
          </label>
          <div class="qa-font-control">
            <button class="qa-font-btn" onclick="adjustFont(-2)">A−</button>
            <button class="qa-font-btn" onclick="adjustFont(2)">A+</button>
          </div>
          <a href="index.html" class="qa-btn qa-btn--outline qa-btn--sm">← Back</a>
        </div>
      </div>

      <!-- Ayah content -->
      <div class="qa-ayah-container" id="ayahContainer">
        <div class="qa-loading-surah">
          <div style="font-family:var(--font-arabic);font-size:3rem;color:rgba(201,168,76,0.3);">﷽</div>
          <p>Select a Surah from the list to begin reading</p>
          <p style="font-size:0.75rem;opacity:0.6;">اخْتَرْ سُورَةً من القائمة للبدء</p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    let allSurahs      = [];
    let currentSurah   = null;
    let arabicFontSize = 1.8;   // rem
    let showTrans      = true;

    // Mobile
    const isMobile = window.innerWidth <= 768;
    if (isMobile) document.getElementById('menuBtn').style.display = '';

    async function init() {
      try {
        allSurahs = await API.getQuranSurahList();
        renderSurahList(allSurahs);
        // Auto-load from URL param
        const params = new URLSearchParams(location.search);
        const s = params.get('surah');
        if (s) loadSurah(parseInt(s));
      } catch {
        document.getElementById('surahListEl').innerHTML =
          `<div style="padding:20px;text-align:center;color:var(--red-lt);font-family:var(--font-ui);font-size:0.85rem;">⚠️ Failed to load Surah list.<br>Check internet connection.</div>`;
      }
    }

    function renderSurahList(surahs) {
      document.getElementById('surahListEl').innerHTML = surahs.map(s => `
        <div class="qa-surah-item${currentSurah===s.number?' active':''}" id="surah-item-${s.number}" onclick="loadSurah(${s.number})">
          <div class="qa-surah-item__num">${s.number}</div>
          <div style="flex:1;min-width:0;">
            <div class="qa-surah-item__ar">${s.name}</div>
            <div class="qa-surah-item__en">${s.englishName}</div>
            <div class="qa-surah-item__meta">${s.numberOfAyahs} ayat · ${s.revelationType}</div>
          </div>
        </div>
      `).join('');
    }

    function filterSurahs() {
      const q = document.getElementById('surahSearchInput').value.toLowerCase();
      const filtered = q
        ? allSurahs.filter(s =>
            s.englishName.toLowerCase().includes(q) ||
            s.name.includes(q) ||
            String(s.number).startsWith(q))
        : allSurahs;
      renderSurahList(filtered);
    }

    async function loadSurah(number) {
      currentSurah = number;

      // Update active state
      document.querySelectorAll('.qa-surah-item').forEach(el => el.classList.remove('active'));
      const item = document.getElementById('surah-item-' + number);
      if (item) { item.classList.add('active'); item.scrollIntoView({ block:'nearest' }); }

      // Show loader
      document.getElementById('ayahContainer').innerHTML = `
        <div class="qa-loading-surah">
          <div class="qa-loader__spinner"></div>
          <p>Loading Surah...</p>
        </div>
      `;

      // Update URL
      history.replaceState(null, '', '?surah=' + number);

      try {
        const [arabicRes, transRes] = await Promise.all([
          API.getQuranSurah(number, 'quran-uthmani'),
          showTrans ? API.getQuranSurah(number, 'en.asad').catch(() => null) : Promise.resolve(null)
        ]);

        const surah = arabicRes;
        const trans = transRes;
        const transMap = {};
        if (trans) trans.ayahs?.forEach(a => { transMap[a.numberInSurah] = a.text; });

        document.getElementById('topbarTitle').textContent = `📖 ${surah.englishName} · ${surah.name}`;

        const showBismillah = number !== 9;
        const html = `
          <div class="qa-bismillah-header">
            ${showBismillah ? `<div class="arabic-bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>` : ''}
            <div class="surah-name-ar">${surah.name}</div>
            <div class="surah-name-en">${surah.englishName}</div>
            <div class="surah-meta">${surah.englishNameTranslation} · ${surah.numberOfAyahs} Ayat · ${surah.revelationType}</div>
          </div>
          ${surah.ayahs.map(a => `
            <div class="qa-ayah-block" id="ayah-${a.numberInSurah}">
              <div class="qa-ayah-arabic-text" style="font-size:${arabicFontSize}rem;">
                ${a.text}
                <span class="qa-ayah-number-inline">${a.numberInSurah}</span>
              </div>
              ${transMap[a.numberInSurah] ? `
                <div class="qa-ayah-translation trans-block" ${showTrans?'':'style="display:none;"'}>
                  (${a.numberInSurah}) ${Utils.sanitize(transMap[a.numberInSurah])}
                </div>` : ''}
            </div>
          `).join('')}
        `;
        document.getElementById('ayahContainer').innerHTML = html;
        document.getElementById('ayahContainer').scrollTop = 0;

        // Close mobile sidebar
        if (isMobile) document.getElementById('surahSidebar').classList.remove('open');
      } catch {
        document.getElementById('ayahContainer').innerHTML = `
          <div class="qa-loading-surah">
            <div style="font-size:2rem;">⚠️</div>
            <p style="color:var(--red-lt);">Failed to load Surah. Check your connection.</p>
            <button class="qa-btn qa-btn--outline" onclick="loadSurah(${number})">Retry</button>
          </div>`;
      }
    }

    function toggleTranslation() {
      showTrans = document.getElementById('showTranslation').checked;
      document.querySelectorAll('.trans-block').forEach(el => {
        el.style.display = showTrans ? '' : 'none';
      });
    }

    function adjustFont(delta) {
      arabicFontSize = Math.max(1.2, Math.min(3.2, arabicFontSize + delta / 10));
      document.querySelectorAll('.qa-ayah-arabic-text').forEach(el => {
        el.style.fontSize = arabicFontSize + 'rem';
      });
    }

    // Close sidebar on overlay click
    document.addEventListener('click', e => {
      if (isMobile && !e.target.closest('.qa-surah-sidebar') && !e.target.closest('#menuBtn')) {
        document.getElementById('surahSidebar').classList.remove('open');
      }
    });

    init();
  </script>
</body>
</html>
